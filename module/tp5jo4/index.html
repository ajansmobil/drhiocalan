<div class="modulex-title f36">
  <h1>{{name}}</h1>
</div>
<div class="modulex">
  <div class="modulex-menu-btn">
    <span>@menu@</span>
    <span class="material-symbols-outlined modulex-icon">menu</span>
  </div>
  <div class="modulex-menu-overlay" id="modulex-menu-overlay" aria-hidden="true"></div>
  <div class="modulex-menu" id="modulex-menu">
    <button class="modulex-menu-close" type="button" aria-label="@menu-close@" aria-controls="modulex-menu">
      <span class="material-symbols-outlined" aria-hidden="true">close</span>
    </button>
    {{pagelist}}
  </div>
  <div class="modulex-desc">
    {{descimg}}
    <div class="modulex-body">{{text}}</div>
  </div>
</div>
<style>
  #content {
    justify-content: start;
  }

  .modulex {
    width: var(--max);
    margin-top: 20px;
    gap: 10px;
    float: left;
    position: relative;
    box-sizing: border-box;
  }

  .modulex * {
    box-sizing: border-box;
  }

  .modulex-menu-btn {
    display: none;
    background-color: --backgroundcolor--;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    color: #fff;
    justify-content: space-between;
    align-items: center;
  }

  .modulex-menu-btn .modulex-icon {
    font-size: 20px;
  }

  .modulex-menu {
    width: 250px;
    background-color: var(--bgcolor);
    border-radius: 5px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    float: left;
  }

  .modulex-desc {
    display: flex;
    flex-direction: column;
    gap: 10px;
    float: right;
  }

  .modulex-menu-link,
  .modulex-top {
    background-color: #fff;
    padding: 10px;
    border-radius: 5px;
    border: 1px solid rgba(0, 0, 0, 0.05);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    color: inherit;
    cursor: pointer;
    transition: background-color 0.2s ease, color 0.2s ease;
    text-align: left;
  }

  .modulex-menu-link.active,
  .modulex-menu-link:hover,
  .modulex-top.active,
  .modulex-top:hover {
    background-color: --menu-active--;
    color: #fff;
  }

  .modulex-menu-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .modulex-top {
    width: 100%;
    border: none;
    font-weight: 600;
    text-align: left;
  }
  
  .modulex-top > div {
    text-align: left;
  }

  .modulex-top .modulex-icon {
    font-size: 14px;
    transition: transform 0.2s ease;
  }

  .modulex-menu-group.open .modulex-top .modulex-icon {
    transform: rotate(180deg);
  }

  .modulex-sub {
    display: none;
    flex-direction: column;
    gap: 5px;
    padding-left: 8px;
  }

  .modulex-sub.show {
    display: flex;
  }

  .modulex-sub-link {
    background-color: #fff;
    padding: 8px 10px;
    border-radius: 5px;
    font-size: 14px;
    border: 1px solid rgba(0, 0, 0, 0.04);
    transition: background-color 0.2s ease, color 0.2s ease;
    text-align: left;
  }

  .modulex-sub-link.active,
  .modulex-sub-link:hover {
    background-color: rgba(39, 156, 144, 0.12);
    color: inherit;
  }

  .modulex-desc-menu {
    width: 200px;
    background-color: --menu-active--;
    display: flex;
    flex-direction: column;
    border-radius: 5px;
  }

  .modulex-desc-menu > div {
    padding: 5px;
    border-radius: 5px;
    background-color: #fff;
    margin: 5px;
  }

  .modulex-desc-body {
    display: flex;
    justify-content: space-between;
  }

  .modulex-title {
    width: 100%;
    height: --height--px;
    background-color: --backgroundcolor--;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    color: #fff;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
  }

  .modulex-title::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    
    background-image: none; 
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
    opacity: --opacity--;
    z-index: 1;
  }

  .modulex-title h1 {
    position: relative;
    z-index: 2;
    font-size: --font-size--px;
    margin: 0;
    color: --textcolor-- !important;
  }

  .modulex-body {
    display: flex;
    flex-direction: column;
    gap: 10px;
    text-align: left;
  }

  .modulex-img {
    display: flex;
    align-items: center;
    justify-content: center;
    width: calc(var(--max) - 460px);
  }

  .modulex-img img {
    width: 100%;
  }


  @media screen and (min-width: 1025px) {
    .modulex-menu-overlay {
      display: none !important;
    }

    .modulex-menu-close {
      display: none !important;
    }

    .modulex-desc {
      width: calc(var(--max) - 290px);
    }

    .modulex-menu {
      position: static !important;
      left: auto !important;
      width: 250px !important;
      max-width: none !important;
      height: auto !important;
      display: flex !important;
      visibility: visible !important;
      box-shadow: none !important;
      padding: 10px;
    }

    .modulex-menu-link {
      padding: 10px 10px 10px 10px;
    }

    .modulex-top {
      padding: 10px 10px 10px 10px;
    }
  }

  @media screen and (max-width: 1024px) {
    .modulex-menu-btn {
      display: flex;
      width: 100%;
      margin: 0;
      border: none;
      position: relative;
      z-index: 1;
    }

    .modulex-menu-btn:focus {
      outline: 2px solid #fff;
      outline-offset: 2px;
    }

    
    .modulex-menu-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 9998;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .modulex-menu-overlay.active {
      display: block;
      opacity: 1;
      pointer-events: auto;
    }

    .modulex {
      display: flex;
      flex-direction: column;
      width: 100%;
      padding: 5px;
      gap: 5px;
      margin-top: 0px;
    }

    .modulex-img {
      width: 100%;
    }

    .modulex-body {
      width: 100%;
      order: 3;
      padding: 10px;
    }

    
    .modulex-menu {
      position: fixed;
      top: 0;
      left: -100%;
      width: 80%;
      max-width: 320px;
      height: 100%;
      background-color: var(--bgcolor);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      transition: left 0.3s ease;
      overflow-y: auto;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.3);
      float: none;
      order: 1;
      gap: 0;
      padding: 0;
      border-radius: 0;
      visibility: hidden;
    }

    .modulex-menu.active {
      left: 0;
      visibility: visible;
    }

    
    .modulex-menu-close {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 15px;
      background-color: transparent;
      border: none;
      cursor: pointer;
      color: inherit;
      font-size: 28px;
      width: 100%;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      flex-shrink: 0;
    }

    
    .modulex-menu > .modulex-menu-group,
    .modulex-menu > .modulex-menu-link {
      padding: 10px;
    }

    .modulex-menu-close span {
      font-size: 28px;
    }

    .modulex-menu-close:focus {
      outline: 2px solid currentColor;
      outline-offset: -2px;
    }

    .modulex-desc {
      width: 100% !important;
      order: 2;
    }
  }
</style>
<script>
  setTimeout(function() {
    var menuToggleBtn = document.querySelector(".modulex-menu-btn");
    var menu = document.querySelector(".modulex-menu");
    var overlay = document.querySelector(".modulex-menu-overlay");
    var closeButton = document.querySelector(".modulex-menu-close");
    
    if (!menuToggleBtn || !menu) {
      return;
    }
    
    var mql = window.matchMedia("(max-width: 1024px)");

    function openMenu() {
      if (menu) {
        menu.classList.add("active");
      }
      if (overlay) {
        overlay.classList.add("active");
        overlay.setAttribute("aria-hidden", "false");
      }

      document.body.style.overflow = "hidden";
    }

    function closeMenu() {
      if (menu) {
        menu.classList.remove("active");
      }
      if (overlay) {
        overlay.classList.remove("active");
        overlay.setAttribute("aria-hidden", "true");
      }

      document.body.style.overflow = "";

      if (menuToggleBtn) {
        menuToggleBtn.focus();
      }
    }

    menuToggleBtn.addEventListener("click", function (e) {
      e.preventDefault();
      e.stopPropagation();
      if (menu.classList.contains("active")) {
        closeMenu();
      } else {
        openMenu();
      }
    });

    if (closeButton) {
      closeButton.addEventListener("click", function (e) {
        e.preventDefault();
        e.stopPropagation();
        closeMenu();
      });
    }

    if (overlay) {
      overlay.addEventListener("click", function (e) {
        e.preventDefault();
        e.stopPropagation();
        closeMenu();
      });
    }

    menu.addEventListener("click", function (event) {
      var link = event.target.closest("a");
      var closeBtn = event.target.closest(".modulex-menu-close");
      if (link && !closeBtn) {
        closeMenu();
      }
    });

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape" && menu && menu.classList.contains("active")) {
        closeMenu();
      }
    });

    menuToggleBtn.addEventListener("keydown", function (e) {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        if (menu.classList.contains("active")) {
          closeMenu();
        } else {
          openMenu();
        }
      }
    });

    function handleBreakpoint() {
      if (!mql.matches) {

        if (menu) {
          menu.classList.remove("active");
        }
        if (overlay) {
          overlay.classList.remove("active");
          overlay.setAttribute("aria-hidden", "true");
        }
        document.body.style.overflow = "";
      }
    }
    
    if (typeof mql.addEventListener === "function") {
      mql.addEventListener("change", handleBreakpoint);
    } else if (typeof mql.addListener === "function") {
      mql.addListener(handleBreakpoint);
    }
    handleBreakpoint();

    document.querySelectorAll(".modulex-top").forEach(function (button) {
      button.addEventListener("click", function (e) {
        e.stopPropagation();
        var group = this.closest(".modulex-menu-group");
        if (!group) return;
        var sub = group.querySelector(".modulex-sub");
        var isOpen = group.classList.toggle("open");
        this.classList.toggle("active", isOpen);
        var icon = this.querySelector(".modulex-icon");
        if (icon) {
          icon.textContent = isOpen ? "expand_less" : "expand_more";
        }
        if (sub) {
          sub.classList.toggle("show", isOpen);
        }
      });
    });
  }, 100);
</script>
