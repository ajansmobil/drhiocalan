<div class="modulex modulexortho" role="region" aria-label="--sectionTitle--">
  <div class="modulexortho-inner">
    <header class="modulexortho-hero">
      <div class="modulexortho-hero-icon" aria-hidden="true">
        
        <svg viewBox="0 0 64 64" width="52" height="52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse class="modulexortho-svg-ring" cx="32" cy="34" rx="28" ry="14" stroke="--clinical--" stroke-width="1.75" opacity="0.35" transform="rotate(-8 32 34)" />
          <path class="modulexortho-svg-arc" d="M10 40 Q32 14 54 40" stroke="--clinicalDark--" stroke-width="2.4" stroke-linecap="round" fill="none" />
          <circle cx="32" cy="26" r="5.5" stroke="--clinical--" stroke-width="2" fill="rgba(13,148,136,0.12)" />
          <circle cx="10" cy="40" r="3.5" fill="--clinicalDark--" opacity="0.9" />
          <circle cx="54" cy="40" r="3.5" fill="--clinicalDark--" opacity="0.9" />
        </svg>
      </div>
      <p class="modulexortho-eyebrow">--sectionEyebrow--</p>
      <h2 class="modulexortho-title">--sectionTitle--</h2>
      <p class="modulexortho-lead">--sectionLead--</p>
    </header>
    <div class="modulexbody">{{html}}</div>
  </div>
</div>
<style>
  
  .modulexortho {
    margin: --margin--;
    width: 100%;
    box-sizing: border-box;
    background: linear-gradient(165deg, --bgcolor-- 0%, #E8F2F0 48%, --bgcolor-- 100%);
    padding: 52px 18px 60px;
  }
  .modulexortho-inner {
    width: --containerWidth--;
    margin: 0 auto;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 40px;
  }
  .modulexortho-hero {
    text-align: left;
    max-width: 40rem;
    margin: 0;
    padding: 0 4px 0 0;
  }
  .modulexortho-hero-icon {
    display: flex;
    justify-content: flex-start;
    margin-bottom: 18px;
  }
  .modulexortho-hero-icon svg {
    display: block;
    cursor: default;
    filter: drop-shadow(0 4px 14px --clinicalSoft--);
  }
  
  @keyframes modulexortho-arc-pulse {
    0%, 100% {
      opacity: 1;
      stroke-dashoffset: 0;
    }
    50% {
      opacity: 0.65;
    }
  }
  @keyframes modulexortho-ring-breathe {
    0%, 100% {
      transform: scale(1);
      opacity: 0.4;
    }
    50% {
      transform: scale(1.04);
      opacity: 0.55;
    }
  }
  .modulexortho-svg-ring {
    transform-origin: 32px 32px;
    animation: modulexortho-ring-breathe 3.2s ease-in-out infinite;
  }
  .modulexortho-svg-arc {
    animation: modulexortho-arc-pulse 2.4s ease-in-out infinite;
  }
  
  @keyframes modulexortho-hero-in {
    from {
      opacity: 0;
      transform: translate3d(0, 14px, 0);
    }
    to {
      opacity: 1;
      transform: translate3d(0, 0, 0);
    }
  }
  .modulexortho-hero > .modulexortho-hero-icon {
    animation: modulexortho-hero-in 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.05s backwards;
  }
  .modulexortho-hero > .modulexortho-eyebrow {
    animation: modulexortho-hero-in 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.15s backwards;
  }
  .modulexortho-hero > .modulexortho-title {
    animation: modulexortho-hero-in 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.28s backwards;
  }
  .modulexortho-hero > .modulexortho-lead {
    animation: modulexortho-hero-in 0.85s cubic-bezier(0.22, 1, 0.36, 1) 0.4s backwards;
  }
  .modulexortho-eyebrow {
    margin: 0 0 8px;
    font-size: 0.8125rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: --clinicalDark--;
  }
  .modulexortho-title {
    margin: 0 0 14px;
    font-size: clamp(1.5rem, 4vw, 2rem);
    font-weight: 700;
    line-height: 1.25;
    color: --ink--;
    letter-spacing: -0.02em;
  }
  .modulexortho-lead {
    margin: 0;
    font-size: 1.0625rem;
    line-height: 1.65;
    color: --muted--;
  }
  .modulexbody {
    display: flex;
    flex-direction: column;
    gap: 28px;
    width: 100%;
    box-sizing: border-box;
  }
  .modulexbodyitem {
    position: relative;
    background: --cardbg--;
    border-radius: --radiusCard--;
    display: flex;
    flex-direction: row;
    overflow: hidden;
    box-shadow: --shadowCard--;
    border: 1px solid --line--;
    cursor: pointer;
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
    opacity: 0;
    will-change: transform, opacity;
    transition:
      opacity 0.9s cubic-bezier(0.22, 1, 0.36, 1),
      transform 0.9s cubic-bezier(0.22, 1, 0.36, 1),
      box-shadow 0.4s ease,
      border-color 0.35s ease;
  }
  
  .modulexbodyitem.left {
    transform: translate3d(-42px, 32px, 0) scale(0.98);
  }
  
  .modulexbodyitem.right {
    transform: translate3d(42px, 32px, 0) scale(0.98);
  }
  .modulexbodyitem.visible {
    opacity: 1;
    transform: translate3d(0, 0, 0) scale(1);
  }
  .modulexbodyitem.visible:hover {
    transform: translate3d(0, -8px, 0) scale(1);
    box-shadow: --shadowHover--;
    border-color: --clinicalSoft--;
  }
  .modulexbodyitem::before {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    width: 4px;
    background: linear-gradient(180deg, --clinical-- 0%, --clinicalDark-- 100%);
    z-index: 3;
    pointer-events: none;
    border-radius: --radiusCard-- 0 0 --radiusCard--;
  }
  .modulexbodyitem.left::before {
    left: 0;
    right: auto;
  }
  .modulexbodyitem.right::before {
    left: auto;
    right: 0;
    border-radius: 0 --radiusCard-- --radiusCard-- 0;
  }
  .modulexbodyitem.left {
    flex-direction: row;
  }
  .modulexbodyitem.right {
    flex-direction: row-reverse;
  }
  .modulexbodyitemlink {
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: inherit;
    width: 100%;
    min-height: 0;
    box-sizing: border-box;
    cursor: pointer;
    align-items: stretch;
  }
  
  .modulexbodyitemimg {
    position: relative;
    overflow: hidden;
    width: 40%;
    min-width: 220px;
    min-height: 280px;
    padding: 0;
    flex-shrink: 0;
    z-index: 1;
    align-self: stretch;
    background: linear-gradient(145deg, --clinicalDark-- 0%, --clinical-- 55%, --clinicalSoft-- 100%);
  }
  .modulexbodyitem.left .modulexbodyitemimg {
    border-radius: --radiusCard-- 0 0 --radiusCard--;
  }
  .modulexbodyitem.right .modulexbodyitemimg {
    border-radius: 0 --radiusCard-- --radiusCard-- 0;
  }
  
  .modulexbodyitemimg::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: linear-gradient(105deg, rgba(15, 23, 42, 0.18) 0%, transparent 50%);
    opacity: 1;
    transition: opacity 0.45s ease;
  }
  .modulexbodyitem.right .modulexbodyitemimg::after {
    background: linear-gradient(-105deg, rgba(15, 23, 42, 0.18) 0%, transparent 50%);
  }
  .modulexbodyitem.visible:hover .modulexbodyitemimg::after {
    opacity: 0.55;
  }
  .modulexbodyitemimg img {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
    z-index: 0;
    transition: transform 0.75s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.5s ease;
    filter: brightness(1) saturate(1.03);
  }
  
  .modulexbodyitem.visible:hover .modulexbodyitemimg img {
    transform: scale(1.12);
    filter: brightness(1.06) saturate(1.08);
  }
  .modulexbodyitemcontent {
    padding: 36px 40px 36px 36px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 14px;
    flex: 1;
    z-index: 2;
    position: relative;
    box-sizing: border-box;
    background: --cardbg--;
  }
  .modulexbodyitem.right .modulexbodyitemcontent {
    padding: 36px 36px 36px 40px;
  }
  .modulexbodyitem.left .modulexbodyitemcontent {
    text-align: right;
  }
  .modulexbodyitem.right .modulexbodyitemcontent {
    text-align: left;
  }
  .modulexbodyitemtitle {
    font-weight: 700;
    color: --ink--;
    font-size: clamp(1.2rem, 2.5vw, 1.5rem);
    line-height: 1.3;
    margin: 0;
    letter-spacing: -0.02em;
    transition: color 0.3s ease, transform 0.35s ease;
  }
  .modulexbodyitem.visible:hover .modulexbodyitemtitle {
    color: --clinicalDark--;
  }
  .modulexbodyitem.left.visible:hover .modulexbodyitemtitle {
    transform: translate3d(-3px, 0, 0);
  }
  .modulexbodyitem.right.visible:hover .modulexbodyitemtitle {
    transform: translate3d(3px, 0, 0);
  }
  .modulexbodyitemdesc {
    color: --muted--;
    font-size: 1rem;
    line-height: 1.7;
    margin: 0;
    font-weight: 400;
  }
  .modulexbodyitemcta {
    margin-top: 6px;
    font-size: 0.9375rem;
    font-weight: 600;
    color: --clinicalDark--;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: gap 0.3s ease;
  }
  .modulexbodyitem.left .modulexbodyitemcta {
    align-self: flex-end;
    flex-direction: row-reverse;
  }
  .modulexbodyitemcta-arrow {
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .modulexbodyitem.left .modulexbodyitemcta:hover .modulexbodyitemcta-arrow,
  .modulexbodyitem.right .modulexbodyitemcta:hover .modulexbodyitemcta-arrow {
    transform: translateX(6px);
  }
  .modulexbodyitem.left .modulexbodyitemcta:hover .modulexbodyitemcta-arrow {
    transform: translateX(-6px);
  }
  .modulexbodyitem.visible:hover .modulexbodyitemcta {
    gap: 10px;
  }
  @media screen and (max-width: 1024px) {
    .modulexortho {
      padding: 36px 14px 44px;
    }
    .modulexortho-inner {
      gap: 32px;
    }
    .modulexbody {
      gap: 22px;
    }
    .modulexbodyitemimg {
      width: 42%;
      min-width: 200px;
      min-height: 260px;
    }
    .modulexbodyitemcontent {
      padding: 28px 28px 28px 24px;
    }
    .modulexbodyitem.right .modulexbodyitemcontent {
      padding: 28px 24px 28px 28px;
    }
  }
  @media screen and (max-width: 768px) {
    .modulexortho-hero {
      text-align: center;
      margin-left: auto;
      margin-right: auto;
    }
    .modulexortho-hero-icon {
      justify-content: center;
    }
    .modulexortho {
      padding: 28px 12px 36px;
    }
    .modulexbodyitem {
      flex-direction: column !important;
      border-radius: --radiusCard--;
    }
    .modulexbodyitem.left,
    .modulexbodyitem.right {
      transform: translate3d(0, 36px, 0) scale(0.98);
    }
    .modulexbodyitem.visible.left,
    .modulexbodyitem.visible.right {
      transform: translate3d(0, 0, 0) scale(1);
    }
    .modulexbodyitem.visible:hover {
      transform: translate3d(0, -6px, 0) scale(1);
    }
    .modulexbodyitem::before {
      width: 100%;
      height: 4px;
      top: 0;
      bottom: auto;
      left: 0;
      right: 0;
      border-radius: --radiusCard-- --radiusCard-- 0 0;
    }
    .modulexbodyitem.right::before {
      border-radius: --radiusCard-- --radiusCard-- 0 0;
    }
    .modulexbodyitemlink {
      flex-direction: column !important;
    }
    .modulexbodyitem.right .modulexbodyitemimg {
      order: -1;
    }
    .modulexbodyitem.right .modulexbodyitemcontent {
      order: 1;
    }
    .modulexbodyitemimg {
      width: 100% !important;
      min-width: 0;
      min-height: 0;
      aspect-ratio: 16 / 9;
      max-height: none;
      border-radius: --radiusCard-- --radiusCard-- 0 0 !important;
    }
    .modulexbodyitem.left .modulexbodyitemimg,
    .modulexbodyitem.right .modulexbodyitemimg {
      border-radius: --radiusCard-- --radiusCard-- 0 0 !important;
    }
    .modulexbodyitemimg img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .modulexbodyitemcontent,
    .modulexbodyitem.left .modulexbodyitemcontent,
    .modulexbodyitem.right .modulexbodyitemcontent {
      text-align: center !important;
      padding: 22px 20px 26px;
      align-items: center;
    }
    .modulexbodyitemcta {
      align-self: center !important;
      flex-direction: row !important;
    }
    .modulexbodyitem.left .modulexbodyitemcta:hover .modulexbodyitemcta-arrow {
      transform: translateX(6px);
    }
    .modulexbodyitem.left.visible:hover .modulexbodyitemtitle,
    .modulexbodyitem.right.visible:hover .modulexbodyitemtitle {
      transform: none;
    }
  }
  @media screen and (max-width: 480px) {
    .modulexortho-eyebrow {
      font-size: 0.75rem;
    }
    .modulexortho-lead {
      font-size: 0.9375rem;
    }
    .modulexbodyitemtitle {
      font-size: 1.125rem;
    }
    .modulexbodyitemdesc {
      font-size: 0.9rem;
    }
    .modulexbodyitemimg {
      aspect-ratio: 4 / 3;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .modulexortho-svg-ring,
    .modulexortho-svg-arc {
      animation: none;
    }
    .modulexortho-hero > .modulexortho-hero-icon,
    .modulexortho-hero > .modulexortho-eyebrow,
    .modulexortho-hero > .modulexortho-title,
    .modulexortho-hero > .modulexortho-lead {
      animation: none;
      opacity: 1;
      transform: none;
    }
    .modulexbodyitem {
      transition: box-shadow 0.35s ease, border-color 0.35s ease;
      opacity: 1;
      transform: none;
    }
    .modulexbodyitem.left,
    .modulexbodyitem.right {
      transform: none;
    }
    .modulexbodyitem.visible:hover {
      transform: none;
    }
    .modulexbodyitem.visible:hover .modulexbodyitemimg img {
      transform: none;
      filter: brightness(1) saturate(1.03);
    }
    .modulexbodyitem.visible:hover .modulexbodyitemtitle {
      transform: none;
    }
    .modulexbodyitemcta-arrow {
      transition: none;
    }
  }
  @media (hover: none) and (pointer: coarse) {
    .modulexbodyitem.visible:hover {
      transform: translate3d(0, 0, 0) scale(1);
      box-shadow: --shadowCard--;
      border-color: --line--;
    }
    .modulexbodyitem.visible:hover .modulexbodyitemimg img {
      transform: none;
      filter: brightness(1) saturate(1.03);
    }
    .modulexbodyitem.visible:hover .modulexbodyitemimg::after {
      opacity: 1;
    }
    .modulexbodyitem.visible:hover .modulexbodyitemtitle {
      color: --ink--;
      transform: none;
    }
  }
</style>
<script>
  
  setTimeout(function() {
    if (typeof IntersectionObserver !== 'undefined') {
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, {
        threshold: 0.06,
        rootMargin: '0px 0px -32px 0px'
      });
      var items = document.querySelectorAll('.modulexbodyitem');
      items.forEach(function(item) {
        observer.observe(item);
      });
    } else {
      var items = document.querySelectorAll('.modulexbodyitem');
      items.forEach(function(item) {
        item.classList.add('visible');
      });
    }
  }, 100);
</script>
