
<div class="modulex modulex-dr-signature">
  
  <div class="modulextitle">
    <div class="modulextitlebody">
      <div class="modulextitlebodylang">
        <ul>
          {{langhtml}}
        </ul>
      </div>
    </div>
  </div>

  <div class="modulex-bar">
    <div class="modulex-shell">
      <div class="modulexbody">
        <div class="modulexbody-inner">
          <div class="modulex-logo-card">
            <a href="/{{lang}}/" class="modulexbodylogolink" title="@home@"
              ><img
                src="/img/{{logo}}?v={{random}}"
                alt="{{web-name}} Logo"
                class="modulexbodylogo"
                loading="lazy"
            /></a>
          </div>
          <button type="button" class="modulex-mobile-toggle" onclick="menu2_toggle()" aria-label="Menüyü aç/kapat" title="Menü">
            <span class="material-symbols-outlined" aria-hidden="true">menu</span>
          </button>
        </div>
      </div>

      <div class="modulexmenubody">
        <div class="modulexmenu" id="menu-2-root">
          <div class="modulex-drawer-header">
            <span class="modulex-drawer-title">@menu@</span>
            <button type="button" class="modulex-drawer-close" onclick="menu2_toggle()" aria-label="Menüyü kapat" title="Kapat">
              <span class="material-symbols-outlined" aria-hidden="true">close</span>
            </button>
          </div>
          <div class="modulex-mainnav-wrap modulex-nav-dock">
            <div class="modulexmenulistbody">
              <div class="modulexmenulist">
                <nav class="modulexmenunav" aria-label="Ana menü">
                  <ul>
                    {{html}}
                  </ul>
                </nav>
              </div>
            </div>
            <a class="modulex-cta" href="/{{lang}}/iletisim/">@contact-us@</a>
          </div>
          <div class="modulexlanguages-mobile">
            <ul>
              {{langhtml}}
            </ul>
          </div>
        </div>
      </div>
    </div>
    <div class="modulex-menu-backdrop" onclick="menu2_toggle()" aria-hidden="true"></div>
  </div>

  
  <div class="modulex-wave" aria-hidden="true">
    <svg class="modulex-wave-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 64" preserveAspectRatio="none">
      <path
        fill="currentColor"
        d="M0,36 C180,8 360,56 540,32 C720,8 900,52 1080,28 C1260,12 1350,20 1440,16 L1440,64 L0,64 Z"
      />
    </svg>
  </div>
</div>
<style>
  

  .modulex-dr-signature {

    box-shadow: none;
  }

  .modulex-dr-signature::after {
    display: none;
  }

  
  .modulextitle {
    position: absolute;

  .modulextitle:has(.modulextitlebodylang ul:empty) {

  }

  .modulextitlebody {
    color: --color--;
    width: auto;
    max-width: 100%;

    justify-content: flex-end;

    box-sizing: border-box;
    pointer-events: auto;
  }

  .modulextitlebodylang:empty,
  .modulextitlebodylang ul:empty {

  }

  .modulextitlebodylang ul {

    align-items: center;

    background: transparent;
    border: none;

  }

  .modulextitlebodylang li {

  }

  .modulextitlebodylang li a {

  .modulextitlebodylang li a .modulex-lang-flag {

      backdrop-filter: blur(4px);

<script>
  
  
  function menu2_sync_scroll_and_aria(isOpen, moduleEl) {
    var mq =
      typeof window.matchMedia === "function"
        ? window.matchMedia("(max-width: 768px)")
        : null;
    var isMobile = mq && mq.matches;
    var lock = isMobile && isOpen;
    if (lock) {
      document.documentElement.style.overflow = "hidden";
      document.body.style.overflow = "hidden";
    } else {
      document.documentElement.style.overflow = "";
      document.body.style.overflow = "";
    }
    var back =
      moduleEl && moduleEl.querySelector
        ? moduleEl.querySelector(".modulex-menu-backdrop")
        : null;
    if (back) {
      
      if (isMobile) {
        back.setAttribute("aria-hidden", isOpen ? "false" : "true");
      } else {
        back.setAttribute("aria-hidden", "true");
      }
    }
  }

  if (typeof window.menu2_toggle === "undefined") {
    window.menu2_toggle = function menu2_toggle() {
      var root = document.getElementById("menu-2-root");
      if (!root) {
        return;
      }
      var wrapper = root.closest ? root.closest(".modulex") : null;
      var target = wrapper || root;
      if (target.classList.contains("modulexmenu-open")) {
        target.classList.remove("modulexmenu-open");
        menu2_sync_scroll_and_aria(false, target);
      } else {
        target.classList.add("modulexmenu-open");
        menu2_sync_scroll_and_aria(true, target);
      }
    };
  }

  setTimeout(function() {
    document.addEventListener("keydown", function(ev) {
      if (ev.key !== "Escape" && ev.keyCode !== 27) {
        return;
      }
      var open = document.querySelector(".modulex.modulexmenu-open");
      if (open && typeof window.menu2_toggle === "function") {
        window.menu2_toggle();
      }
    });

    if (typeof window.matchMedia === "function") {
      var mqWide = window.matchMedia("(min-width: 769px)");
      var onWide = function() {
        if (!mqWide.matches) {
          return;
        }
